<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fleet Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine -->
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 text-gray-700">

<div class="flex">

    <!-- ================= SIDEBAR (your new system) ================= -->
    <aside class="w-64 h-screen bg-gray-100 border-r border-gray-200 fixed">

        <!-- LOGO -->
        <div class="p-4 border-b">
            <img src="assets/images/logo.png" class="h-30 w-auto" alt="Logo" />
        </div>

        <!-- NAV -->
        <nav class="p-2 space-y-1">

            <!-- Dashboard -->
            <a href="index.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                Dashboard
            </a>

            <!-- Project -->
            <a href="project.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg bg-white shadow text-black font-medium">
                <i data-lucide="folder" class="w-5 h-5"></i>
                Project
            </a>

            <!-- Ticket -->
            <a href="ticket.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">
                <i data-lucide="ticket" class="w-5 h-5"></i>
                Ticket
            </a>

            <!-- SETTINGS -->
            <div x-data="{ open: false }" class="space-y-1">

                <button @click="open = !open"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Settings

                    <i data-lucide="chevron-down"
                    class="w-4 h-4 ml-auto transition-transform"
                    :class="{ 'rotate-180': open }"></i>
                </button>

                <div x-show="open" x-transition class="pl-8 space-y-1">

                    <a href="driver.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="user" class="w-4 h-4"></i>
                        Driver
                    </a>

                    <a href="sites.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        Sites
                    </a>

                    <a href="lorry.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="truck" class="w-4 h-4"></i>
                        Lorry
                    </a>

                </div>

            </div>

        </nav>
    </aside>


    <!-- ================= MAIN ================= -->
    <div class="flex-1 ml-64">

        <!-- HEADER -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 fixed w-[calc(100%-16rem)]">

            <h1 class="text-lg font-semibold uppercase">
                Fleet Management System
            </h1>

            <!-- PROFILE DROPDOWN -->
            <div x-data="{ open: false }" class="relative">

                <!-- TRIGGER -->
                <button @click="open = !open"
                        class="flex items-center gap-3 focus:outline-none">

                    <img src="assets/images/avatar-2.jpg"
                        class="w-10 h-10 rounded-full border" />

                    <div class="text-sm text-left">
                        <div class="font-medium">Aaron Chia</div>
                        <div class="text-gray-500 text-xs">aaron@gmail.com</div>
                    </div>

                </button>

                <!-- DROPDOWN -->
                <div x-show="open"
                    @click.away="open = false"
                    x-transition
                    class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">

                    <!-- PROFILE -->
                    <a href="profile.html"
                    class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100">

                        <i data-lucide="user-circle" class="w-4 h-4"></i>
                        Profile
                    </a>

                    <!-- DIVIDER -->
                    <div class="border-t"></div>

                    <!-- LOGOUT -->
                    <a href="logout.html"
                    class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50">

                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Logout
                    </a>

                </div>

            </div>

        </header>

        <!-- CONTENT -->
        <main class="pt-20 p-6" x-data="groupPage()">

            <!-- TITLE BAR -->
            <div class="flex justify-between items-center mb-4">

                <div>
                    <h2 class="text-xl font-semibold">Project</h2>
                    <p class="text-sm text-gray-500">List of projects</p>
                </div>

                <!-- OPEN OFFCANVAS BUTTON -->
                <button @click="open = true"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                    + Add Project
                </button>

            </div>

            <!-- TABLE CARD -->
            <div class="bg-white rounded-xl shadow">

                <!-- SEARCH -->
                <div class="p-4 border-b flex justify-end">
                    <input type="text"
                           placeholder="Search..."
                           class="border rounded-lg px-3 py-2 w-64">
                </div>

                <!-- TABLE -->
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-left">
                        <tr>
                            <th class="p-3">Name</th>
                            <th>Description</th>
                            <th>Total Tickets</th>
                            <th class="text-right p-3">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr class="border-t hover:bg-gray-50">
                            <td class="p-3">Silver Project</td>
                            <td>All silver members</td>
                            <td>5</td>
                            <td class="text-right p-3">
                                <a href="project-view.html"
                                class="inline-flex items-center justify-center w-9 h-9 rounded-lg
                                        bg-gray-100 hover:bg-white hover:shadow-md
                                        text-gray-600 hover:text-black transition">

                                    <i data-lucide="eye" class="w-4 h-4"></i>

                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>

            <!-- ================= OFFCANVAS ================= -->
            <div x-show="open"
                 x-transition
                 class="fixed inset-0 flex justify-end bg-black/40">

                <!-- PANEL -->
                <div @click.away="open = false"
                     class="w-full max-w-md bg-white h-full shadow-xl p-6">

                    <!-- HEADER -->
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">Add Project</h2>

                        <button @click="open = false"
                                class="text-gray-500 hover:text-black">
                            ✕
                        </button>
                    </div>

                    <!-- FORM -->
                    <form class="space-y-4">

                        <div>
                            <label class="text-sm font-medium">Name</label>
                            <input type="text"
                                   class="w-full border rounded-lg px-3 py-2 mt-1">
                        </div>

                        <div>
                            <label class="text-sm font-medium">Description</label>
                            <textarea class="w-full border rounded-lg px-3 py-2 mt-1"></textarea>
                        </div>

                        <div class="flex justify-end gap-2 pt-4 border-t">

                            <button type="button"
                                    @click="open = false"
                                    class="px-4 py-2 border rounded-lg">
                                Cancel
                            </button>

                            <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                Save
                            </button>

                        </div>

                    </form>

                </div>
            </div>

            <!-- FOOTER -->
            <footer class="mt-10 text-xs text-gray-500 border-t pt-4">
                Copyright © 2026 AZCode
            </footer>

        </main>

    </div>
</div>

<!-- SCRIPT -->
<script>
function groupPage() {
    return {
        open: false
    }
}

lucide.createIcons();
</script>

</body>
</html>
