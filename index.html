<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fleet Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine -->
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 text-gray-700">

<div x-data="{ sidebar:false }" class="min-h-screen bg-gray-100">

    <!-- ================= SIDEBAR ================= -->
    <!-- MOBILE OVERLAY -->
    <div x-show="sidebar"
        x-transition
        class="fixed inset-0 bg-black/40 z-40 lg:hidden"
        @click="sidebar=false">
    </div>

    <!-- SIDEBAR -->
    <aside
        :class="sidebar ? 'translate-x-0' : '-translate-x-full'"
        class="fixed lg:translate-x-0 transition-transform duration-300 z-50
            w-64 h-screen bg-gray-100 border-r border-gray-200">

        <!-- LOGO -->
        <div class="p-4 border-b flex items-center justify-between">

            <a href="https://azcodeee.github.io/fleet-office/">
                <img src="assets/images/logo.jpeg" class="h-32" alt="Logo">
            </a>

            <!-- CLOSE BUTTON MOBILE -->
            <button class="lg:hidden"
                    @click="sidebar=false">

                ✕

            </button>

        </div>

        <!-- NAV -->
        <nav class="p-2 space-y-1 overflow-y-auto h-[calc(100vh-100px)]">

            <!-- Dashboard -->
            <a href="index.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg bg-white shadow text-black font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                Dashboard
            </a>

            <!-- Project -->
            <a href="project.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">
                <i data-lucide="folder" class="w-5 h-5"></i>
                Project
            </a>

            <!-- Ticket -->
            <a href="ticket.html"
               class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">
                <i data-lucide="ticket" class="w-5 h-5"></i>
                Ticket
            </a>

            <a href="maintenance.html"
                class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">
                <i data-lucide="wrench" class="w-5 h-5"></i>
                Maintenance

            </a>

            <!-- SETTINGS -->
            <div x-data="{ open: false }" class="space-y-1">

                <button @click="open = !open"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Settings

                    <i data-lucide="chevron-down"
                    class="w-4 h-4 ml-auto transition-transform"
                    :class="{ 'rotate-180': open }"></i>
                </button>

                <div x-show="open" x-transition class="pl-8 space-y-1">

                    <a href="driver.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="user" class="w-4 h-4"></i>
                        Driver
                    </a>

                    <a href="region.html"
                       class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="map" class="w-4 h-4"></i>
                        Region

                    </a>

<a href="sites.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        Sites
                    </a>
                    <a href="lorry.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white hover:shadow transition">

                        <i data-lucide="truck" class="w-4 h-4"></i>
                        Lorry
                    </a>

                </div>

            </div>

        </nav>
    </aside>

    <!-- ================= MAIN ================= -->
    <div class="lg:ml-64 min-h-screen">

        <!-- HEADER -->
        <header class="fixed top-0 right-0 left-0 lg:left-64
               h-16 bg-white border-b border-gray-200
               flex items-center justify-between px-4 lg:px-6 z-30">

            <div class="flex items-center gap-3">

                <!-- MOBILE MENU -->
                <button class="lg:hidden"
                        @click="sidebar=true">

                    <i data-lucide="menu" class="w-6 h-6"></i>

                </button>

                <h1 class="text-sm lg:text-lg font-semibold uppercase">
                    Fleet Management System
                </h1>

            </div>

            <!-- PROFILE DROPDOWN -->
            <div x-data="{ open: false }" class="relative">

                <!-- TRIGGER -->
                <button @click="open = !open"
                        class="flex items-center gap-3 focus:outline-none">

                    <img src="assets/images/avatar-2.jpg"
                        class="w-10 h-10 rounded-full border" />

                    <div class="text-sm text-left">
                        <div class="font-medium">Chris Martin</div>
                        <div class="text-gray-500 text-xs">martin@gmail.com</div>
                    </div>

                </button>

                <!-- DROPDOWN -->
                <div x-show="open"
                    @click.away="open = false"
                    x-transition
                    class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">

                    <!-- PROFILE -->
                    <a href="profile.html"
                    class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100">

                        <i data-lucide="user-circle" class="w-4 h-4"></i>
                        Profile
                    </a>

                    <!-- DIVIDER -->
                    <div class="border-t"></div>

                    <!-- LOGOUT -->
                    <a href="logout.html"
                    class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50">

                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Logout
                    </a>

                </div>

            </div>

        </header>

        <!-- CONTENT -->
        <main class="p-6 pt-20 space-y-6">
            <!-- ================= KPI CARDS ================= -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                <!-- Revenue -->
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Total Revenue</p>
                            <h2 class="text-2xl font-bold">$128,450</h2>
                        </div>
                        <div class="p-3 bg-green-100 text-green-600 rounded-lg">
                            <i data-lucide="dollar-sign"></i>
                        </div>
                    </div>
                </div>

                <!-- Idling Lorry -->
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Idling Lorries</p>
                            <h2 class="text-2xl font-bold">12</h2>
                        </div>
                        <div class="p-3 bg-red-100 text-red-600 rounded-lg">
                            <i data-lucide="truck"></i>
                        </div>
                    </div>
                </div>

                <!-- Active Projects -->
                <div class="bg-white rounded-xl shadow p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Active Projects</p>
                            <h2 class="text-2xl font-bold">7</h2>
                        </div>
                        <div class="p-3 bg-blue-100 text-blue-600 rounded-lg">
                            <i data-lucide="folder"></i>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ================= SECOND ROW ================= -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

                <!-- CHART -->
                <div class="bg-white rounded-xl shadow p-4 lg:col-span-2">
                    <h3 class="font-semibold mb-4">Revenue Overview</h3>

                    <canvas id="revenueChart" height="120"></canvas>
                </div>

                <!-- QUICK STATS -->
                <div class="bg-white rounded-xl shadow p-4">
                    <h3 class="font-semibold mb-4">Fleet Status</h3>

                    <div class="space-y-3">

                        <div class="flex justify-between">
                            <span>Running</span>
                            <span class="font-semibold text-green-600">18</span>
                        </div>

                        <div class="flex justify-between">
                            <span>Idle</span>
                            <span class="font-semibold text-yellow-600">12</span>
                        </div>

                        <div class="flex justify-between">
                            <span>Maintenance</span>
                            <span class="font-semibold text-red-600">4</span>
                        </div>

                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <footer class="text-xs text-gray-500 border-t pt-4">
                Copyright © 2026. Powered by AZCode
            </footer>

        </main>

    </div>
</div>

<script>
    lucide.createIcons();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('revenueChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
            label: 'Revenue',
            data: [12000, 19000, 15000, 22000, 18000, 26000, 24000],
            borderWidth: 2,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            x: {
                grid: {
                    display: false
                }
            },
            y: {
                grid: {
                    color: "#eee"
                }
            }
        }
    }
});
</script>
</body>
</html>
